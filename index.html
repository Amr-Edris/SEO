<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>

  <script>
    const BASE_PATH = "/SEO";
    const params = new URLSearchParams(window.location.search);

    const lang =
      params.get("lang") ||
      localStorage.getItem("lang") ||
      (navigator.language.startsWith("en") ? "en" : "ar");

    const theme =
      params.get("theme") ||
      localStorage.getItem("theme") ||
      "light";

    localStorage.setItem("lang", lang);
    localStorage.setItem("theme", theme);

    // Validate language (in case of wrong links)
    if (lang !== "en" && lang !== "ar") {
      lang = "ar"; // fallback default
    }


    const page = lang === "en" ? "/en/" : "/ar/";

    window.location.replace(`${BASE_PATH}${page}/?theme=${theme}`);
  </script>
</head>
<body>
  Loading...
</body>
</html>
